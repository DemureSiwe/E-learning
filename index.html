<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Education Website-Busisiwe Tsetseng</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <a href="#" class="logo"> <span>MH</span>Master Hub </a>

      <ul class="navbar">
        <a href="#">Create Resume</a>
        <a href="#">Skillset</a>
        <a href="#">Partner Job Boards</a>
        <a href="#">Conatct Us</a>
      </ul>

      <div class="h-right">
        <a href="#" class="h-btn">
          Register Now
          <span class="h-icon">
            <i class="fa-solid fa-arrow-right"></i>
          </span>
        </a>
        <div class="bx bx-menu" id="menu-icon">
          <i class="fa-solid fa-bars"></i>
        </div>
      </div>
    </header>

    <section class="hero">
      <div class="hero-content">
        <div class="h-text">
          <a href="#" class="hero-in">
            <i class="fa-solid fa-lock"></i>
            Your #1 Platform for skill sharing
          </a>
          <h1>
            Showcase your Mastery. <br />
            Get Connected
          </h1>
          <p>
            Create your profile, showcase your skills and let <br />
            employers find you.
          </p>
        </div>

        <form action="" class="input-form">
          <div class="input-box input-border">
            <span>Location</span>
            <input type="search" name="" placeholder="Search Location" />
          </div>

          <div class="input-box input-border">
            <span>Start</span>
            <input type="date" name="start-date" id="start-date" />
          </div>

          <div class="input-box">
            <span>Return</span>
            <input type="date" name="return-date" id="return-date" />
          </div>
          <i class="fa-solid fa-magnifying-glass search-btn"></i>
        </form>
      </div>
    </section>

    <div class="infinite">
      <div class="t-img">
        <img src="./src/images/t1.png" alt="" />
        <img src="./src/images/t2.png" alt="" />
        <img src="./src/images/t3.png" alt="" />
        <img src="./src/images/t4.png" alt="" />
        <img src="./src/images/t1.png" alt="" />
        <img src="./src/images/t2.png" alt="" />
        <img src="./src/images/t3.png" alt="" />
        <img src="./src/images/t4.png" alt="" />
        <img src="./src/images/t1.png" alt="" />
        <img src="./src/images/t3.png" alt="" />
      </div>
    </div>

    <script
      src="https://kit.fontawesome.com/0604c62f53.js"
      crossorigin="anonymous"
    ></script>
    <script src="main.js "></script>
  </body>
</html>
